name: recepieapp
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  json_annotation: ^4.11.0
  connectivity_plus: ^7.0.0
  image_picker: ^1.2.1
  dotted_border: ^3.1.0
  
  flutter_bloc: ^9.1.1
  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  hive: ^2.0.6
  hive_flutter: ^1.1.0
  # Google Sign In - only this version works the GoogleSignIn(); method
  google_sign_in: ^6.2.1
  logger: ^2.7.0
  go_router: ^17.1.0
  equatable: ^2.0.8
  firebase_storage: ^12.4.10
  cloud_firestore: ^5.6.12

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/applogo.png"

flutter:

  uses-material-design: true

  assets:
  - assets/Images/
  - assets/

  fonts:
    - family: Epilogue
      fonts:
        - asset: assets/fonts/Epilogue-Regular.ttf
        - asset: assets/fonts/Epilogue-Medium.ttf
          weight: 500
        - asset: assets/fonts/Epilogue-Bold.ttf
          weight: 700
    - family: Ephesis
      fonts:
        - asset: assets/fonts/Ephesis-Regular.ttf
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700  
          
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
